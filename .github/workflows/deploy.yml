name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Firebase config from secrets
        run: |
          printf 'export const firebaseConfig = {\n  apiKey: "%s",\n  authDomain: "%s",\n  projectId: "%s",\n  storageBucket: "%s",\n  messagingSenderId: "%s",\n  appId: "%s"\n};\n' \
            "${{ secrets.FIREBASE_API_KEY }}" \
            "${{ secrets.FIREBASE_AUTH_DOMAIN }}" \
            "${{ secrets.FIREBASE_PROJECT_ID }}" \
            "${{ secrets.FIREBASE_STORAGE_BUCKET }}" \
            "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" \
            "${{ secrets.FIREBASE_APP_ID }}" \
            > js/firebase-config.js

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,.gitignore'
