name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Firebase config from secrets
        env:
          API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER_ID:${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
        run: |
          cat > js/firebase-config.js << EOF
          export const firebaseConfig = {
            apiKey: "${API_KEY}",
            authDomain: "${AUTH_DOMAIN}",
            projectId: "${PROJECT_ID}",
            storageBucket: "${STORAGE_BUCKET}",
            messagingSenderId: "${MESSAGING_SENDER_ID}",
            appId: "${APP_ID}"
          };
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,.gitignore'
